# Deploy static dashboard to GitHub Pages (gh-pages branch).
# After first successful run: Settings → Pages → Deploy from branch → gh-pages → / (root)

name: Build and deploy dashboard

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard data
        run: |
          if [ -f data/dashboard.json ]; then
            echo "Using committed data/dashboard.json"
          else
            python scripts/build_dashboard.py
          fi

      - name: Assemble site
        run: |
          mkdir -p site
          cp index.html site/
          cp -r css js assets data site/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
