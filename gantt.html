<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cutover Gantt</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/gantt.css" />
  </head>
  <body>
    <nav class="main-tabs">
      <a href="index.html" class="main-tab">Overview</a>
      <a href="gantt.html" class="main-tab active" aria-current="page">Gantt</a>
    </nav>

    <div id="loading" class="loading">Loading gantt view…</div>

    <div id="gantt-app" hidden>
      <header class="header gantt-header">
        <div class="header-text">
          <h1>Cutover Gantt</h1>
          <p class="subtitle" id="gantt-subtitle">By category · click a row for tasks</p>
          <p class="meta-line">
            <span class="legend-inline late-dot"></span> Delayed &nbsp;
            <span class="legend-inline today-line"></span> Today
          </p>
        </div>
        <div class="gantt-header-actions">
          <button
            type="button"
            id="btn-refresh"
            class="btn-refresh-icon"
            aria-label="Refresh from SharePoint"
            title="Refresh from SharePoint"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M21 12a9 9 0 1 1-2.64-6.36"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M21 3v6h-6"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <img class="logo" src="assets/resmed-logo.png" alt="ResMed" width="120" height="36" />
        </div>
      </header>

      <div class="gantt-scroll">
        <div class="gantt-chart" id="gantt-chart"></div>
      </div>

      <aside id="gantt-detail" class="gantt-detail" hidden>
        <header class="detail-header">
          <h2 id="gantt-detail-title">Tasks</h2>
          <button type="button" class="detail-close" id="gantt-detail-close" aria-label="Close">×</button>
        </header>
        <div class="gantt-detail-chart" id="gantt-detail-chart"></div>
      </aside>
    </div>

    <script src="js/config.js"></script>
    <script src="js/data-loader.js"></script>
    <script src="js/gantt.js"></script>
  </body>
</html>
